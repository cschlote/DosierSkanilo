name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:

env:
  VA_TEST: "abc"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-24.04
    container:
      image: alpine:3.20
    steps:
      - name: Install base tools
        run: apk add --no-cache git bash tar zstd

      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache DUB
        uses: actions/cache@v4
        with:
          path: |
            .dub
            /root/.dub
          key: ${{ runner.os }}-dub-${{ hashFiles('dub.json', 'dub.selections.json') }}
          restore-keys: |
            ${{ runner.os }}-dub-

      - name: Install lint dependencies
        run: sh ./scripts/install-dependencies.sh lint

      - name: Run lint
        run: ./scripts/lint.sh

  build:
    name: Build
    runs-on: ubuntu-24.04
    container:
      image: alpine:3.20
    needs:
      - lint
    steps:
      - name: Install base tools
        run: apk add --no-cache git bash tar zstd

      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache DUB
        uses: actions/cache@v4
        with:
          path: |
            .dub
            /root/.dub
          key: ${{ runner.os }}-dub-${{ hashFiles('dub.json', 'dub.selections.json') }}
          restore-keys: |
            ${{ runner.os }}-dub-

      - name: Install build dependencies
        run: sh ./scripts/install-dependencies.sh build

      - name: Show tool versions
        run: |
          ldc2 --version
          dub --version

      - name: Build project
        run: ./scripts/build.sh

  test:
    name: Test
    runs-on: ubuntu-24.04
    container:
      image: alpine:3.20
    needs:
      - build
    steps:
      - name: Install base tools
        run: apk add --no-cache git bash tar zstd

      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache DUB
        uses: actions/cache@v4
        with:
          path: |
            .dub
            /root/.dub
          key: ${{ runner.os }}-dub-${{ hashFiles('dub.json', 'dub.selections.json') }}
          restore-keys: |
            ${{ runner.os }}-dub-

      - name: Install build dependencies
        run: sh ./scripts/install-dependencies.sh build

      - name: Install runtime dependencies
        run: sh ./scripts/install-dependencies.sh runtime

      - name: Run tests
        run: ./scripts/test.sh

  deploy_staging:
    name: Deploy Staging
    runs-on: ubuntu-24.04
    container:
      image: alpine:3.20
    needs:
      - test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: staging
      url: https://packages.vahanus.net
    steps:
      - name: Install base tools
        run: apk add --no-cache git bash

      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to staging
        run: ./scripts/deploy.sh

  deploy_prod:
    name: Deploy Production
    runs-on: ubuntu-24.04
    container:
      image: alpine:3.20
    needs:
      - test
    if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://packages.vahanus.net
    steps:
      - name: Install base tools
        run: apk add --no-cache git bash

      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to production placeholder
        run: echo "Deploy to production server"

  build_pages:
    name: Build Pages
    runs-on: ubuntu-24.04
    container:
      image: debian:13-slim
    needs:
      - test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Install base tools
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            ca-certificates git bash tar zstd

      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache DUB
        uses: actions/cache@v4
        with:
          path: |
            .dub
            /root/.dub
          key: ${{ runner.os }}-dub-${{ hashFiles('dub.json', 'dub.selections.json') }}
          restore-keys: |
            ${{ runner.os }}-dub-

      - name: Install build dependencies
        run: sh ./scripts/install-dependencies.sh build

      - name: Build project and docs
        run: ./scripts/build.sh

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy_pages:
    name: Deploy Pages
    runs-on: ubuntu-24.04
    needs:
      - build_pages
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
