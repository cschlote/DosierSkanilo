# Use Alpine as CI base image and install required dependencies via script.
variables:
  # We can pass ENV vars to the pipeline
  VA_TEST: "abc"

default:
  image: "alpine:3.20"
  tags:
    - gitlabdocker
    - ryzen
  before_script:
    - command -v image-info.sh && image-info.sh || true

stages:
  - lint
  - build
  - test
  - deploy

#-- Do linting on the supplied sources --------------------------------------

lint:
  stage: lint
  allow_failure: false
  before_script:
    - sh ./scripts/install-dependencies.sh lint
  script:
    - ./scripts/lint.sh
  cache:
    key: "DUB-CACHE"
    untracked: true
    paths:
      - .dub/

#-- Build the application ---------------------------------------------------

.build:
  stage: build
  tags:
    - gitlabdocker
  before_script:
    - sh ./scripts/install-dependencies.sh build
    - sh ./scripts/install-dependencies.sh runtime
  script:
    - ldc2 --version
    - dub --version
    - ./scripts/build.sh
    - tar -C public -czf public.tar.gz .
    - ls -l public.tar.gz
    - ./scripts/test.sh

build:debian13:
  image: "debian:13-slim"
  extends: .build

build:ubuntu24.04:
  image: "ubuntu:24.04"
  extends: .build

build:alpine:
  image: "alpine:3.23"
  extends: .build
  artifacts:
    expire_in: 1 week
    paths:
      - public.tar.gz
      - "source-*.lst"

#-- Deploy the application --------------------------------------------------

deploy_staging:
  before_script:
    - sh ./scripts/install-dependencies.sh build
    - sh ./scripts/install-dependencies.sh runtime
  stage: deploy
  script:
    - ./scripts/deploy.sh
  environment:
    name: staging
    url: https://packages.vahanus.net
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "testing"'
      when: always
    - when: manual

deploy_prod:
  before_script:
    - sh ./scripts/install-dependencies.sh build
    - sh ./scripts/install-dependencies.sh runtime
  stage: deploy
  script:
    - echo "Deploy to production server"
  environment:
    name: production
    url: https://packages.vahanus.net
  rules:
    - if: '$CI_COMMIT_TAG =~ /^(v+)\d+\.\d+\.\d+$/'
      when: always
    - when: manual

#-- Publish API docs via GitLab Pages ---------------------------------------

pages:
  stage: deploy
  needs:
    - job: build:alpine
      artifacts: true
  script:
    - rm -rf public
    - mkdir -p public
    - tar -xzf public.tar.gz -C public
    - echo "API documentation published to GitLab Pages at ${CI_PAGES_URL}."
  artifacts:
    paths:
      - public
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
