# Use Alpine as CI base image and install required dependencies via script.
variables:
  # We can pass ENV vars to the pipeline
  VA_TEST: "abc"

default:
  image: "alpine:3.20"
  tags:
    - gitlabdocker
    - ryzen
  before_script:
    - command -v image-info.sh && image-info.sh || true

stages:
  - lint
  - build
  - test
  - deploy

#-- Do linting on the supplied sources --------------------------------------

lint:
  stage: lint
  allow_failure: false
  before_script:
    - sh ./scripts/install-dependencies.sh lint
  script:
    - ./scripts/lint.sh
  cache:
    key: "DUB-CACHE"
    untracked: true
    paths:
      - .dub/

#-- Build the application ---------------------------------------------------

build:
  stage: build
  before_script:
    - sh ./scripts/install-dependencies.sh build
  script:
    - ldc2 --version
    - dub --version
    - ./scripts/build.sh
  cache:
    key: "DUB-CACHE"
    untracked: true
    paths:
      - .dub/

build_docs:
  stage: deploy
  image: "debian:13-slim"
  tags:
    - gitlabdocker
    - ryzen
  before_script:
    - apt-get update
    - DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends ca-certificates git bash tar zstd
    - sh ./scripts/install-dependencies.sh build
  script:
    - ldc2 --version
    - dub --version
    - dub run adrdox -- . ${CI_PROJECT_DIR}/source/dosierskanilo -o docs -i --skeleton ${CI_PROJECT_DIR}/skeleton.html
    - cp -f ${CI_PROJECT_DIR}/dosierskanilo-icon.svg ${CI_PROJECT_DIR}/docs/dosierskanilo-icon.svg
    - tar -C docs -czf docs.tar.gz .
    - ls -l docs.tar.gz
  artifacts:
    expire_in: 1 week
    paths:
      - docs.tar.gz
  cache:
    key: "DUB-CACHE"
    untracked: true
    paths:
      - .dub/

#-- Test the application ----------------------------------------------------

test:
  stage: test
  before_script:
    - sh ./scripts/install-dependencies.sh build
    - sh ./scripts/install-dependencies.sh runtime
  script:
    - ./scripts/test.sh
  artifacts:
    when: always
    expire_in: 1 week
    paths:
      - "source-*.lst"
  cache:
    key: "DUB-CACHE"
    untracked: true
    paths:
      - .dub/

#-- Deploy the application --------------------------------------------------

deploy_staging:
  stage: deploy
  script:
    - ./scripts/deploy.sh
  environment:
    name: staging
    url: https://packages.vahanus.net
  only:
    - master

deploy_prod:
  stage: deploy
  script:
    - echo "Deploy to production server"
  environment:
    name: production
    url: https://packages.vahanus.net
  when: manual
  only:
    - master

#-- Publish API docs via GitLab Pages ---------------------------------------

pages:
  stage: deploy
  needs:
    - job: build_docs
      artifacts: true
  script:
    - rm -rf public
    - mkdir -p public
    - tar -xzf docs.tar.gz -C public
    - echo "API documentation published to GitLab Pages at ${CI_PAGES_URL}."
  artifacts:
    paths:
      - public
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
