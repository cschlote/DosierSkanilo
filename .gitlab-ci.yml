# Use Alpine as CI base image and install required dependencies via script.
variables:
  # We can pass ENV vars to the pipeline
  VA_TEST: "abc"

default:
  image: "alpine:3.20"
  before_script:
    - command -v image-info.sh && image-info.sh || true

stages:
  - lint
  - build
  - test
  - deploy

#-- Do linting on the supplied sources --------------------------------------

lint:
  tags:
    - gitlabdocker
  stage: lint
  allow_failure: false
  before_script:
    - sh ./scripts/install-dependencies.sh lint
  script:
    - ./scripts/lint.sh
  cache:
    key: "DUB-CACHE"
    untracked: true
    paths:
      - .dub/

#-- Build the application ---------------------------------------------------

build:
  tags:
    - gitlabdocker
  stage: build
  before_script:
    - sh ./scripts/install-dependencies.sh build
  script:
    - ldc2 --version
    - dub --version
    - ./scripts/build.sh
  artifacts:
    expire_in: 1 week
    paths:
      - docs/
      - docs.json
  cache:
    key: "DUB-CACHE"
    untracked: true
    paths:
      - .dub/

#-- Test the application ----------------------------------------------------

test:
  tags:
    - gitlabdocker
  stage: test
  before_script:
    - sh ./scripts/install-dependencies.sh build
    - sh ./scripts/install-dependencies.sh runtime
  script:
    - ./scripts/test.sh
  artifacts:
    when: always
    expire_in: 1 week
    paths:
      - "source-*.lst"
  cache:
    key: "DUB-CACHE"
    untracked: true
    paths:
      - .dub/

#-- Deploy the application --------------------------------------------------

deploy_staging:
  tags:
    - gitlabdocker
  stage: deploy
  script:
    - ./scripts/deploy.sh
  environment:
    name: staging
    url: https://packages.vahanus.net
  only:
    - master

deploy_prod:
  tags:
    - gitlabdocker
  stage: deploy
  script:
    - echo "Deploy to production server"
  environment:
    name: production
    url: https://packages.vahanus.net
  when: manual
  only:
    - master

#-- Publish API docs via GitLab Pages ---------------------------------------

pages:
  tags:
    - gitlabdocker
  stage: deploy
  needs:
    - job: build
      artifacts: true
  script:
    - rm -rf public
    - mkdir -p public
    - cp -a docs/. public/
  artifacts:
    paths:
      - public
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
