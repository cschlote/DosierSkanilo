<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-labelledby="title desc">
  <title id="title">DosierSkanilo Icon</title>
  <desc id="desc">A stylized document stack and scanner lens in teal tones.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f766e"/>
      <stop offset="100%" stop-color="#115e59"/>
    </linearGradient>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#0f172a" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect x="8" y="8" width="112" height="112" rx="22" fill="url(#bg)"/>

  <g filter="url(#shadow)">
    <rect x="27" y="25" width="52" height="66" rx="6" fill="url(#paper)"/>
    <rect x="33" y="36" width="31" height="4" rx="2" fill="#94a3b8"/>
    <rect x="33" y="45" width="39" height="4" rx="2" fill="#94a3b8"/>
    <rect x="33" y="54" width="28" height="4" rx="2" fill="#94a3b8"/>
    <rect x="33" y="63" width="36" height="4" rx="2" fill="#94a3b8"/>
  </g>

  <g transform="translate(71 72)">
    <circle cx="0" cy="0" r="18" fill="#ccfbf1"/>
    <circle cx="0" cy="0" r="12" fill="#14b8a6"/>
    <circle cx="0" cy="0" r="6" fill="#0f766e"/>
    <rect x="11" y="11" width="22" height="8" rx="4" transform="rotate(42)" fill="#99f6e4"/>
    <rect x="15" y="15" width="14" height="3" rx="1.5" transform="rotate(42)" fill="#115e59"/>
  </g>
</svg>
